name: Verify

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  static-checks:
    name: 🛡️ Static Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Install Shell Tools
        run: sudo apt-get install -y shfmt shellcheck

      - name: Check Formatting
        run: bun run check:format

      - name: Check Spelling
        run: bun run check:spell

      - name: Check Shell
        run: bun run check:shell

  backend:
    name: 🐍 Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Check Formatting
        run: uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy src

      - name: Unit Tests
        run: uv run pytest

  frontend:
    name: ⚛️ Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit Tests
        run: bun run test:run

  e2e:
    name: 🎭 E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Backend
        run: uv sync
        working-directory: backend

      - name: Install Frontend
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E
        working-directory: frontend
        env:
          # Empty, reset-on-boot database and recordings dir: never touch a
          # user-mode data file from CI.
          DICTION_RUN_MODE: 'dev'
          # No GPU or model stack in CI: serve canned scores and canned
          # reference audio instead of loading the scoring and TTS models.
          DICTION_USE_STUB_SCORER: 'true'
          DICTION_USE_STUB_PROSODY: 'true'
          # No local LLM in CI: serve canned explanations and grammar critique
          # instead of calling Ollama.
          DICTION_USE_STUB_EXPLAINER: 'true'
          DICTION_USE_STUB_CRITIC: 'true'
          DICTION_USE_STUB_SYNTH: 'true'
        run: |
          (cd ../backend && uv run uvicorn diction.main:app --app-dir src --port 8000) &
          BACKEND_PID=$!
          trap "kill $BACKEND_PID 2>/dev/null || true; pkill -f 'diction.main:app' 2>/dev/null || true" EXIT
          for _ in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health >/dev/null 2>&1 && break
            sleep 1
          done
          bunx playwright test --project=chromium

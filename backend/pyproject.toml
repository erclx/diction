[project]
name = "diction-backend"
version = "0.0.0"
description = "Local pronunciation-training backend: FastAPI serving the speech pipeline"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]

[dependency-groups]
dev = [
    "mypy>=1.13",
    "ruff>=0.7",
    "pytest>=8.3",
    "pytest-cov>=6.0",
    "httpx>=0.27",
]
